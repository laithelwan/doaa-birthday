<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رسائل القرآن</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- خلفية متحركة -->
<div class="background"></div>

<div class="container">

  <h1>اختر شعورك 🤍</h1>

  <div class="grid">

    <div class="card" onclick="show('joy')">💖 فرح</div>
    <div class="card" onclick="show('sad')">🌧 حزن</div>
    <div class="card" onclick="show('anger')">🔥 غضب</div>
    <div class="card" onclick="show('peace')">🤍 طمأنينة</div>

  </div>

  <div id="result"></div>

</div>

<script src="messages.js"></script>
</body>
</html>
